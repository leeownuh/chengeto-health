services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: chengeto-backend:prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:${MONGO_PASSWORD}@mongodb:27017/chengeto_health?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 7d
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRE: 30d
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      MQTT_PORT: 1883
      MQTT_WS_PORT: 8083
      MQTT_DEMO_AUTH: ${MQTT_DEMO_AUTH:-false}
      CORS_ORIGIN: ${CORS_ORIGIN}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
    ports:
      - "5000:5000"
      - "1883:1883"
      - "8083:8083"
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - chengeto-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL}
    image: chengeto-frontend:prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
    networks:
      - chengeto-network

